# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
language: "pt-BR"
tone_instructions: "Seja direto e objetivo. Foque em bugs reais, segurança e regressões; evite nitpicks de estilo."
reviews:
  profile: "chill"
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/node_modules/**"
chat:
  auto_reply: true
